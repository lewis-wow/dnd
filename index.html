<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"
    />
    <meta name="theme-color" content="#0f0d1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Kostky pro D&amp;D</title>
    <script>
      // Mobile browsers resize their own chrome (address bar, etc.) without
      // reliably updating 100vh/100dvh in time, which is what let the page
      // become scrollable. Measure the real visible height in JS instead and
      // expose it as --app-height, kept live on every resize/orientation change.
      (function () {
        function setAppHeight() {
          var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
          document.documentElement.style.setProperty("--app-height", h + "px");
        }
        setAppHeight();
        window.addEventListener("resize", setAppHeight);
        window.addEventListener("orientationchange", setAppHeight);
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", setAppHeight);
          window.visualViewport.addEventListener("scroll", setAppHeight);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
